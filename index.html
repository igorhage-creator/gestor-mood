<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor Mood Mentoria</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;--border:#2e3248;--border2:#3d4265;--text:#f0f2ff;--text2:#9aa0c4;--text3:#6b7199;--accent:#6c63ff;--accent2:#8b85ff;--accent-bg:rgba(108,99,255,.15);--green:#22d3a0;--green-bg:rgba(34,211,160,.12);--red:#f06292;--red-bg:rgba(240,98,146,.12);--amber:#fbbf24;--amber-bg:rgba(251,191,36,.12);--blue:#60a5fa;--blue-bg:rgba(96,165,250,.12);--shadow:0 4px 24px rgba(0,0,0,.4);--radius:14px;--radius-sm:8px}
[data-theme="light"]{--bg:#f4f5fb;--bg2:#ffffff;--bg3:#eef0fa;--border:#e2e5f5;--border2:#c8ccec;--text:#1a1d2e;--text2:#5a6080;--text3:#9aa0c4;--shadow:0 4px 24px rgba(100,110,180,.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:var(--shadow)}
.login-logo{font-size:36px;text-align:center;margin-bottom:8px}
.login-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:28px}
.lf{margin-bottom:16px}.lf label{font-size:11px;font-weight:600;color:var(--text3);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.lf input{width:100%;padding:12px 14px;font-size:14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg3);color:var(--text);font-family:inherit;outline:none;transition:border .2s}
.lf input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:13px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s}
.login-btn:hover{opacity:.88}.login-btn:disabled{opacity:.5}
.login-error{background:var(--red-bg);border:1px solid var(--red);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--red);margin-top:12px;display:none}
#app{display:none}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:60px;gap:12px;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex:1}
.theme-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.theme-btn:hover{border-color:var(--accent)}
#sync{font-size:11px;color:var(--text3);background:var(--bg3);padding:3px 10px;border-radius:20px;border:1px solid var(--border)}
.logout{padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:12px;cursor:pointer;background:transparent;color:var(--text2);font-family:inherit;transition:all .2s}
.logout:hover{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.nav-wrap{background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-wrap::-webkit-scrollbar{height:0}
.tabs{display:flex;padding:0 16px;gap:2px;min-width:max-content}
.tab{padding:14px 16px;border:none;background:transparent;color:var(--text3);font-family:inherit;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;font-weight:500}
.tab:hover{color:var(--text2)}.tab.on{color:var(--accent2);border-bottom-color:var(--accent)}
.wrap{max-width:1000px;margin:0 auto;padding:20px 16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;transition:border .2s}
.card:hover{border-color:var(--border2)}
.ct{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:14px;text-transform:uppercase;letter-spacing:.07em}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:all .2s;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);opacity:0;transition:opacity .2s}
.mc:hover::before{opacity:1}.mc:hover{border-color:var(--border2);transform:translateY(-1px)}
.ml{font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.mv{font-size:22px;font-weight:700;letter-spacing:-.02em}
.mtrend{font-size:11px;margin-top:4px;font-weight:500}
.g{color:var(--green)}.r{color:var(--red)}.a{color:var(--amber)}.b{color:var(--blue)}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:14px}.dg .card{margin-bottom:0}
.cw{position:relative;height:200px}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:480px}
th{text-align:left;font-weight:600;color:var(--text3);font-size:11px;padding:8px 10px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em}
td{padding:10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--bg3)}
input,select,textarea{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg3);color:var(--text);font-family:inherit;outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:56px}select option{background:var(--bg2)}
.row{display:flex;gap:10px;margin-bottom:10px;align-items:flex-end}
.col{flex:1}.col label{font-size:11px;color:var(--text3);margin-bottom:5px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.btn{padding:9px 18px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:13px;cursor:pointer;background:transparent;color:var(--text);font-family:inherit;transition:all .2s;font-weight:500}
.btn:hover{background:var(--bg3)}.btn.p{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;border:none;box-shadow:0 4px 14px rgba(108,99,255,.3)}
.btn.p:hover{opacity:.88}.btn.sm{padding:5px 10px;font-size:11px}
.bx{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.bx.receita,.bx.a-receber{background:var(--green-bg);color:var(--green)}
.bx.despesa,.bx.a-pagar{background:var(--red-bg);color:var(--red)}
.bx.pago,.bx.recebido{background:var(--green-bg);color:var(--green)}.bx.pendente{background:var(--amber-bg);color:var(--amber)}.bx.vencido{background:var(--red-bg);color:var(--red)}
.bx.recorrente{background:var(--accent-bg);color:var(--accent2)}
.empty{text-align:center;color:var(--text3);font-size:13px;padding:32px 0}
.ib{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:4px 7px;border-radius:6px;transition:all .2s}
.ib:hover{background:var(--red-bg);color:var(--red)}
.eb{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:4px 7px;border-radius:6px;transition:all .2s}
.eb:hover{background:var(--accent-bg);color:var(--accent2)}
.sr{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid var(--border)}
.sr:last-child{border-bottom:none;font-weight:600;padding-top:12px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:var(--radius-sm);font-size:13px;opacity:0;transition:all .3s;z-index:999;pointer-events:none;box-shadow:var(--shadow);max-width:300px}
.toast.show{opacity:1;transform:translateY(-4px)}
.dl{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;justify-content:center}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.va{background:var(--amber-bg);border:1px solid rgba(251,191,36,.3);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;font-size:13px;display:flex;align-items:center;gap:10px}
.va.vv{background:var(--red-bg);border-color:rgba(240,98,146,.3)}
.pb{font-size:10px;background:var(--accent-bg);color:var(--accent2);padding:2px 7px;border-radius:20px;font-weight:600}
.recb{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-top:8px;display:none}.recb.on{display:block}
.frow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}.frow select{width:auto;padding:7px 10px;font-size:12px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:500px;margin:16px;box-shadow:var(--shadow)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:18px}.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.rpb{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.rb2{padding:8px 18px;border-radius:20px;border:1px solid var(--border);font-size:13px;cursor:pointer;background:transparent;color:var(--text3);font-family:inherit;transition:all .2s;font-weight:500}
.rb2:hover{color:var(--text)}.rb2.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent2)}
.rdd{display:none;margin-bottom:16px;gap:10px;flex-wrap:wrap;align-items:flex-end}.rdd.on{display:flex}
.rp{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-top:14px}
.rh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.rl{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.rl span{font-size:13px;color:var(--text3);display:block;margin-top:3px;-webkit-text-fill-color:var(--text3)}
.rm{text-align:right;font-size:12px;color:var(--text3)}.rm strong{display:block;font-size:14px;color:var(--text);margin-bottom:2px;-webkit-text-fill-color:var(--text)}
.rs{margin-bottom:24px}.rst{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.rk{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px}
.rkc{background:var(--bg3);border-radius:var(--radius-sm);padding:12px 14px;text-align:center}
.rkl{font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}.rkv{font-size:18px;font-weight:700}
.rcw{height:180px;position:relative;margin-bottom:16px}
.rt{width:100%;border-collapse:collapse;font-size:12px}
.rt th{background:var(--bg3);padding:9px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);border:1px solid var(--border)}
.rt td{padding:8px 10px;border:1px solid var(--border);color:var(--text)}.rt tr:nth-child(even) td{background:var(--bg3)}
.rpi{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}.rpi:last-child{border-bottom:none}
.rf{margin-top:24px;padding-top:16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);text-align:center}
.panel{display:none}.panel.on{display:block}
@media(max-width:640px){.dg{grid-template-columns:1fr}.row{flex-direction:column;gap:8px}.mg{grid-template-columns:1fr 1fr}.wrap{padding:14px 12px}header{padding:0 14px}}
@media(max-width:400px){.mg{grid-template-columns:1fr}.mv{font-size:18px}}
@media print{body{background:#fff;color:#000}header,.nav-wrap,.btn,.rpb,.rdd,.frow,.vt,.modal-bg{display:none!important}.rp{border:none;padding:0}}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">&#x1F7E3;</div>
    <div class="login-title">Mood Mentoria</div>
    <div class="login-sub">Gest&#xE3;o financeira e operacional</div>
    <div class="lf"><label>E-mail</label><input type="email" id="lemail" placeholder="seu@email.com"></div>
    <div class="lf"><label>Senha</label><input type="password" id="lsenha" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;" onkeydown="if(event.key==='Enter')login()"></div>
    <button class="login-btn" id="lbtn" onclick="login()">Entrar</button>
    <div class="login-error" id="lerr"></div>
  </div>
</div>
<!-- MODAL TRANSACAO -->
<div class="modal-bg" id="modal-trans">
  <div class="modal">
    <h3>&#x270F;&#xFE0F; Editar transa&#xE7;&#xE3;o</h3>
    <input type="hidden" id="et-id">
    <div class="row"><div class="col"><label>Tipo</label><select id="et-tipo"><option value="receita">Receita</option><option value="despesa">Despesa</option></select></div><div class="col" style="max-width:130px"><label>Valor (R$)</label><input type="number" id="et-val" step="0.01"></div></div>
    <div class="row"><div class="col"><label>Descri&#xE7;&#xE3;o</label><input type="text" id="et-desc"></div></div>
    <div class="row"><div class="col"><label>Categoria</label><input type="text" id="et-cat"></div><div class="col" style="max-width:140px"><label>Data</label><input type="date" id="et-data"></div></div>
    <div class="modal-btns"><button class="btn" onclick="fecharModal('modal-trans')">Cancelar</button><button class="btn p" onclick="salvarTrans()">Salvar</button></div>
  </div>
</div>
<!-- MODAL LANCAMENTO -->
<div class="modal-bg" id="modal-lanc">
  <div class="modal">
    <h3>&#x270F;&#xFE0F; Editar lan&#xE7;amento</h3>
    <input type="hidden" id="el-id">
    <div class="row"><div class="col"><label>Tipo</label><select id="el-tipo"><option value="a-receber">A Receber</option><option value="a-pagar">A Pagar</option></select></div><div class="col" style="max-width:130px"><label>Valor (R$)</label><input type="number" id="el-val" step="0.01"></div></div>
    <div class="row"><div class="col"><label>Descri&#xE7;&#xE3;o</label><input type="text" id="el-desc"></div></div>
    <div class="row"><div class="col"><label>Vencimento</label><input type="date" id="el-venc"></div><div class="col"><label>Notas</label><input type="text" id="el-nota"></div></div>
    <div style="margin:10px 0 8px;display:flex;align-items:center;gap:8px">
      <input type="checkbox" id="el-rec" onchange="togRecEdit()" style="width:auto;margin:0;accent-color:var(--accent)">
      <label for="el-rec" style="font-size:13px;cursor:pointer;font-weight:500;color:var(--text2)">&#x1F501; Recorrente</label>
    </div>
    <div class="recb" id="el-rec-box">
      <div class="row">
        <div class="col"><label>Frequ&#xEA;ncia</label><select id="el-freq" onchange="calcParcEdit()"><option value="mensal">Mensal</option><option value="anual">Anual</option></select></div>
        <div class="col"><label>Data final</label><input type="date" id="el-dfim" onchange="calcParcEdit()"></div>
        <div class="col"><label>Total parcelas</label><input type="text" id="el-tp" readonly style="background:var(--bg);color:var(--text3)"></div>
      </div>
    </div>
    <div class="modal-btns"><button class="btn" onclick="fecharModal('modal-lanc')">Cancelar</button><button class="btn p" onclick="salvarLanc()">Salvar</button></div>
  </div>
</div>
<div id="app">
  <header>
    <div class="logo">&#x1F7E3; Mood Mentoria</div>
    <span id="sync">conectando...</span>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">&#x1F319;</button>
    <button class="logout" onclick="logout()">Sair</button>
  </header>
  <div class="nav-wrap">
    <div class="tabs">
      <button class="tab on" onclick="tab('dash')">&#x1F4CA; Dashboard</button>
      <button class="tab" onclick="tab('fin')">&#x1F4B0; Financeiro</button>
      <button class="tab" onclick="tab('lanc')">&#x1F4CB; Lan&#xE7;amentos</button>
      <button class="tab" onclick="tab('rel')">&#x1F4C4; Relat&#xF3;rio</button>
    </div>
  </div>
  <div class="wrap">
    <div id="p-dash" class="panel on">
      <div id="dash-m" class="mg"></div>
      <div class="dg">
        <div class="card"><div class="ct">&#x1F4C8; Receitas x Despesas</div><div class="cw"><canvas id="ch-bar"></canvas></div></div>
      </div>
      <div class="card" style="margin-top:14px"><div class="ct">&#x23F0; Pr&#xF3;ximos vencimentos</div><div id="dash-venc"></div></div>
    </div>
    <div id="p-fin" class="panel">
      <div id="fin-m" class="mg"></div>
      <div class="card">
        <div class="ct">&#x2795; Nova transa&#xE7;&#xE3;o</div>
        <div class="row"><div class="col"><label>Tipo</label><select id="f-tipo"><option value="receita">Receita</option><option value="despesa">Despesa</option></select></div><div class="col" style="max-width:140px"><label>Valor (R$)</label><input type="number" id="f-val" step="0.01"></div></div>
        <div class="row"><div class="col"><label>Descri&#xE7;&#xE3;o</label><input type="text" id="f-desc" placeholder="Ex: Consultoria Vale"></div></div>
        <div class="row"><div class="col"><label>Categoria</label><input type="text" id="f-cat" placeholder="Ex: Mentoria"></div><div class="col" style="max-width:140px"><label>Data</label><input type="date" id="f-data"></div></div>
        <button class="btn p" onclick="addTrans()">+ Adicionar</button>
      </div>
      <div class="card">
        <div class="ct">&#x1F4CB; Extrato</div>
        <div class="frow">
          <select id="ff-tipo" onchange="renderExtrato()"><option value="">Receitas e despesas</option><option value="receita">S&#xF3; receitas</option><option value="despesa">S&#xF3; despesas</option></select>
          <select id="ff-ord" onchange="renderExtrato()"><option value="desc">Data &#x2193; recente</option><option value="asc">Data &#x2191; antiga</option></select>
        </div>
        <div class="tbl-wrap"><div id="ext-body"></div></div>
      </div>
      <div class="card"><div class="ct">&#x1F4CA; Resumo</div><div id="fin-res"></div></div>
    </div>
    <div id="p-lanc" class="panel">
      <div class="card">
        <div class="ct">&#x2795; Novo lan&#xE7;amento</div>
        <div class="row"><div class="col"><label>Descri&#xE7;&#xE3;o</label><input type="text" id="l-desc" placeholder="Ex: Aluguel, Mensalidade..."></div></div>
        <div class="row"><div class="col"><label>Tipo</label><select id="l-tipo"><option value="a-receber">A Receber</option><option value="a-pagar">A Pagar</option></select></div><div class="col" style="max-width:140px"><label>Valor (R$)</label><input type="number" id="l-val" step="0.01"></div><div class="col" style="max-width:160px"><label>1&#xBA; Vencimento</label><input type="date" id="l-venc"></div></div>
        <div class="row"><div class="col"><label>Notas</label><textarea id="l-nota" style="min-height:44px"></textarea></div></div>
        <div style="margin:10px 0 8px;display:flex;align-items:center;gap:8px">
          <input type="checkbox" id="l-rec" onchange="togRec()" style="width:auto;margin:0;accent-color:var(--accent)">
          <label for="l-rec" style="font-size:13px;cursor:pointer;font-weight:500;color:var(--text2)">&#x1F501; Lan&#xE7;amento recorrente</label>
        </div>
        <div class="recb" id="rec-box">
          <div class="row"><div class="col"><label>Frequ&#xEA;ncia</label><select id="l-freq" onchange="calcParc()"><option value="mensal">Mensal</option><option value="anual">Anual</option></select></div><div class="col"><label>Data final</label><input type="date" id="l-dfim" onchange="calcParc()"></div><div class="col"><label>Total parcelas</label><input type="text" id="l-tp" readonly style="background:var(--bg);color:var(--text3)"></div></div>
        </div>

<script>
firebase.initializeApp({apiKey:"AIzaSyCaIZh1HkuYh3lPKX5ugJFWLm7RY1M2ufY",authDomain:"gestor-mood.firebaseapp.com",projectId:"gestor-mood",storageBucket:"gestor-mood.firebasestorage.app",messagingSenderId:"851165695843",appId:"1:851165695843:web:32468963ceea55f815cd56"});
var db=firebase.firestore(),auth=firebase.auth();
var D={tr:[],la:[]},charts={},RP='sem',relCh=null;
var THEME=localStorage.getItem('theme-mood')||'dark';
function applyTheme(t){THEME=t;document.documentElement.setAttribute('data-theme',t);document.getElementById('theme-btn').textContent=t==='dark'?'\u{1F319}':'☀️';localStorage.setItem('theme-mood',t);Chart.defaults.color=t==='dark'?'#6b7199':'#9aa0c4';}

auth.onAuthStateChanged(function(u){if(u){document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';loadAll();}else{document.getElementById('login-screen').style.display='flex';document.getElementById('app').style.display='none';}});
function login(){var e=document.getElementById('lemail').value.trim(),s=document.getElementById('lsenha').value;var btn=document.getElementById('lbtn'),err=document.getElementById('lerr');if(!e||!s){err.textContent='Preencha e-mail e senha.';err.style.display='block';return;}btn.disabled=true;btn.textContent='Entrando...';err.style.display='none';auth.signInWithEmailAndPassword(e,s).catch(function(ex){var m={'auth/invalid-credential':'E-mail ou senha incorretos.','auth/too-many-requests':'Muitas tentativas.'};err.textContent=m[ex.code]||'Erro ao entrar.';err.style.display='block';btn.disabled=false;btn.textContent='Entrar';});}
function logout(){auth.signOut();D={tr:[],ta:[],la:[]};}
function toast(msg,dur){dur=dur||2800;var t=document.getElementById('tst');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},dur);}
function setSy(msg,c){var e=document.getElementById('sync');e.textContent=msg;e.style.color=c||'var(--text3)';}
function fmt(v){return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fd(d){if(!d)return '—';try{return new Date(d+'T12:00').toLocaleDateString('pt-BR');}catch(e){return d;}}
function kc(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function dv(d){var h=new Date();h.setHours(0,0,0,0);return Math.round((new Date(d+'T12:00')-h)/864e5);}
function stL(l){if(l.quitado)return l.tipo==='a-pagar'?'pago':'recebido';return dv(l.vencimento)<0?'vencido':'pendente';}

function isDark(){return THEME==='dark';}
function cc(){return{grid:isDark()?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)',green:'#22d3a0',greenBg:isDark()?'rgba(34,211,160,.15)':'rgba(34,211,160,.2)',red:'#f06292',redBg:isDark()?'rgba(240,98,146,.15)':'rgba(240,98,146,.2)',accent:'#6c63ff',accentBg:isDark()?'rgba(108,99,255,.15)':'rgba(108,99,255,.2)',text:isDark()?'#6b7199':'#9aa0c4'};}
function proxV(d,f){var dt=new Date(d+'T12:00');f==='mensal'?dt.setMonth(dt.getMonth()+1):dt.setFullYear(dt.getFullYear()+1);return dt.toISOString().split('T')[0];}
function totP(ini,fim,f){if(!ini||!fim)return null;var d=new Date(ini+'T12:00'),ff=new Date(fim+'T12:00'),c=1;while(true){f==='mensal'?d.setMonth(d.getMonth()+1):d.setFullYear(d.getFullYear()+1);if(d>ff)break;c++;}return c;}
function togRec(){document.getElementById('rec-box').classList.toggle('on',document.getElementById('l-rec').checked);}
function calcParc(){var i=gv('l-venc'),f=gv('l-dfim'),fr=gv('l-freq');if(i&&f){var t=totP(i,f,fr);document.getElementById('l-tp').value=t?t+' parcelas':'';}}
function togRecEdit(){document.getElementById('el-rec-box').classList.toggle('on',document.getElementById('el-rec').checked);}
function calcParcEdit(){var i=gv('el-venc'),f=gv('el-dfim'),fr=gv('el-freq');if(i&&f){var t=totP(i,f,fr);document.getElementById('el-tp').value=t?t+' parcelas':'';}}
function loadAll(){setSy('sincronizando...');Promise.all([db.collection('transacoes').get().then(function(s){D.tr=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});}),db.collection('lancamentos').get().then(function(s){D.la=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});})]).then(function(){setSy('● online','var(--green)');renderAll();}).catch(function(){setSy('● offline','var(--red)');});}
function tab(id){document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on');});document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});document.getElementById('p-'+id).classList.add('on');var ids=['dash','fin','lanc','rel'];document.querySelectorAll('.tab')[ids.indexOf(id)].classList.add('on');if(id==='dash')renderDash();}
function renderDash(){
  var rec=D.tr.filter(function(t){return t.tipo==='receita';}).reduce(function(a,t){return a+t.valor;},0);
  var des=D.tr.filter(function(t){return t.tipo==='despesa';}).reduce(function(a,t){return a+t.valor;},0);
  var aR=D.la.filter(function(l){return l.tipo==='a-receber'&&!l.quitado;}).reduce(function(a,l){return a+l.valor;},0);
  var aP=D.la.filter(function(l){return l.tipo==='a-pagar'&&!l.quitado;}).reduce(function(a,l){return a+l.valor;},0);
  document.getElementById('dash-m').innerHTML='<div class="mc"><div class="ml">Saldo</div><div class="mv '+(rec-des>=0?'g':'r')+'">'+fmt(rec-des)+'</div><div class="mtrend" style="color:var(--text3)">Acumulado</div></div><div class="mc"><div class="ml">Receitas</div><div class="mv g">'+fmt(rec)+'</div><div class="mtrend g">↑ Entradas</div></div><div class="mc"><div class="ml">Despesas</div><div class="mv r">'+fmt(des)+'</div><div class="mtrend r">↓ Sa\xEDdas</div></div><div class="mc"><div class="ml">A Receber</div><div class="mv b">'+fmt(aR)+'</div><div class="mtrend" style="color:var(--text3)">Pendente</div></div><div class="mc"><div class="ml">A Pagar</div><div class="mv a">'+fmt(aP)+'</div><div class="mtrend" style="color:var(--text3)">Pendente</div></div>';
  var m={};D.tr.filter(function(t){return t.data;}).forEach(function(t){var k=t.data.slice(0,7);if(!m[k])m[k]={r:0,d:0};t.tipo==='receita'?m[k].r+=t.valor:m[k].d+=t.valor;});
  var ks=Object.keys(m).sort(),mn=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var lb=ks.map(function(k){var p=k.split('-');return mn[+p[1]-1]+'/'+p[0].slice(2);});
  kc('ch-bar');var el=document.getElementById('ch-bar');if(!el)return;
  if(!ks.length){el.closest('.cw').innerHTML='<div class="empty">Sem dados financeiros.</div>';}
  else{var c=cc();charts['ch-bar']=new Chart(el.getContext('2d'),{type:'bar',data:{labels:lb,datasets:[{label:'Receitas',data:ks.map(function(k){return m[k].r;}),backgroundColor:c.greenBg,borderColor:c.green,borderWidth:2,borderRadius:6,borderSkipped:false},{label:'Despesas',data:ks.map(function(k){return m[k].d;}),backgroundColor:c.redBg,borderColor:c.red,borderWidth:2,borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11},boxWidth:10,color:c.text}},tooltip:{backgroundColor:isDark()?'#1a1d27':'#fff',titleColor:isDark()?'#f0f2ff':'#1a1d2e',bodyColor:isDark()?'#9aa0c4':'#5a6080',borderColor:isDark()?'#2e3248':'#e2e5f5',borderWidth:1,padding:10,callbacks:{label:function(x){return ' '+fmt(x.raw);}}}},scales:{y:{ticks:{font:{size:10},color:c.text,callback:function(v){return 'R$'+v.toLocaleString('pt-BR');}},grid:{color:c.grid},border:{display:false}},x:{ticks:{font:{size:10},color:c.text},grid:{display:false},border:{display:false}}}}});}

  var vl=D.la.filter(function(x){return !x.quitado;}).sort(function(a,b){return a.vencimento.localeCompare(b.vencimento);}).slice(0,5);
  if(!vl.length){document.getElementById('dash-venc').innerHTML='<div class="empty">Nenhum vencimento pendente. ✅</div>';return;}
  document.getElementById('dash-venc').innerHTML=vl.map(function(x){var d=dv(x.vencimento),vc=d<0,px=d>=0&&d<=3;var pb=x.recorrente&&x.parcelaAtual?' <span class="pb">'+x.parcelaAtual+'/'+x.totalParcelas+'</span>':'';var info=vc?'<span style="color:var(--red);font-weight:600;font-size:11px">● Vencido h\xE1 '+Math.abs(d)+'d</span>':px?'<span style="color:var(--amber);font-weight:600;font-size:11px">⚠ Vence em '+d+'d</span>':'<span style="color:var(--text3);font-size:11px">em '+d+' dias</span>';return '<div class="va '+(vc?'vv':'')+'"><span style="font-size:18px">'+(x.tipo==='a-pagar'?'\u{1F534}':'\u{1F7E2}')+'</span><div style="flex:1"><div style="font-weight:600;font-size:14px">'+x.desc+pb+'</div><div style="margin-top:3px;display:flex;gap:8px;align-items:center">'+info+'<span style="color:var(--text3);font-size:11px">'+fd(x.vencimento)+'</span></div></div><div style="text-align:right"><div style="font-weight:700;font-size:15px;color:'+(x.tipo==='a-pagar'?'var(--red)':'var(--green)')+'">'+fmt(x.valor)+'</div><span class="bx '+x.tipo+'" style="font-size:10px">'+(x.tipo==='a-pagar'?'A Pagar':'A Receber')+'</span></div></div>';}).join('');
}
function addTrans(){var desc=document.getElementById('f-desc').value.trim(),val=parseFloat(document.getElementById('f-val').value);if(!desc||isNaN(val)||val<=0){alert('Preencha descri\xE7\xE3o e valor.');return;}var obj={tipo:document.getElementById('f-tipo').value,desc:desc,valor:val,categoria:document.getElementById('f-cat').value.trim(),data:document.getElementById('f-data').value||new Date().toISOString().split('T')[0],criadoEm:Date.now()};db.collection('transacoes').add(obj).then(function(r){D.tr.unshift(Object.assign({id:r.id},obj));['f-desc','f-val','f-cat','f-data'].forEach(function(i){document.getElementById(i).value='';});toast('✅ Transa\xE7\xE3o salva!');renderFin();});}
function editarTrans(id){var t=D.tr.find(function(x){return x.id===id;});if(!t)return;document.getElementById('et-id').value=id;document.getElementById('et-tipo').value=t.tipo;document.getElementById('et-desc').value=t.desc;document.getElementById('et-val').value=t.valor;document.getElementById('et-cat').value=t.categoria||'';document.getElementById('et-data').value=t.data||'';document.getElementById('modal-trans').classList.add('on');}
function salvarTrans(){var id=document.getElementById('et-id').value;var upd={tipo:document.getElementById('et-tipo').value,desc:document.getElementById('et-desc').value.trim(),valor:parseFloat(document.getElementById('et-val').value),categoria:document.getElementById('et-cat').value.trim(),data:document.getElementById('et-data').value};if(!upd.desc||isNaN(upd.valor)){alert('Preencha todos os campos.');return;}db.collection('transacoes').doc(id).update(upd).then(function(){var t=D.tr.find(function(x){return x.id===id;});if(t)Object.assign(t,upd);fecharModal('modal-trans');toast('✅ Atualizado!');renderFin();});}
function delTrans(id){if(!confirm('Excluir?'))return;db.collection('transacoes').doc(id).delete().then(function(){D.tr=D.tr.filter(function(t){return t.id!==id;});toast('Removido');renderFin();});}
function renderFin(){renderFinM();renderExtrato();renderFinRes();}
function renderFinM(){var r=D.tr.filter(function(t){return t.tipo==='receita';}).reduce(function(a,t){return a+t.valor;},0);var d=D.tr.filter(function(t){return t.tipo==='despesa';}).reduce(function(a,t){return a+t.valor;},0);document.getElementById('fin-m').innerHTML='<div class="mc"><div class="ml">Receitas</div><div class="mv g">'+fmt(r)+'</div></div><div class="mc"><div class="ml">Despesas</div><div class="mv r">'+fmt(d)+'</div></div><div class="mc"><div class="ml">Saldo</div><div class="mv '+(r-d>=0?'g':'r')+'">'+fmt(r-d)+'</div></div>';}
function renderExtrato(){var ft=gv('ff-tipo'),ord=gv('ff-ord')||'desc';var list=D.tr.filter(function(t){return ft===''||t.tipo===ft;});list.sort(function(a,b){return ord==='asc'?(a.data||'').localeCompare(b.data||''):(b.data||'').localeCompare(a.data||'');});if(!list.length){document.getElementById('ext-body').innerHTML='<div class="empty">Nenhuma transa\xE7\xE3o.</div>';return;}document.getElementById('ext-body').innerHTML='<table><tr><th>Data</th><th>Descri\xE7\xE3o</th><th>Tipo</th><th style="text-align:right">Valor</th><th></th></tr>'+list.map(function(t){return '<tr><td style="color:var(--text3);font-size:12px">'+fd(t.data)+'</td><td style="font-weight:500">'+t.desc+(t.categoria?'<br><span style="font-size:11px;color:var(--text3)">'+t.categoria+'</span>':'')+'</td><td><span class="bx '+t.tipo+'">'+t.tipo+'</span></td><td style="text-align:right;font-weight:700;color:'+(t.tipo==='receita'?'var(--green)':'var(--red)')+'">'+fmt(t.valor)+'</td><td style="white-space:nowrap"><button class="eb" onclick="editarTrans(\''+t.id+'\')">&#x270F;&#xFE0F;</button><button class="ib" onclick="delTrans(\''+t.id+'\')">✕</button></td></tr>';}).join('')+'</table>';}
function renderFinRes(){var r=D.tr.filter(function(t){return t.tipo==='receita';}).reduce(function(a,t){return a+t.valor;},0);var d=D.tr.filter(function(t){return t.tipo==='despesa';}).reduce(function(a,t){return a+t.valor;},0);document.getElementById('fin-res').innerHTML='<div class="sr"><span style="color:var(--text2)">Receitas</span><span style="color:var(--green);font-weight:600">'+fmt(r)+'</span></div><div class="sr"><span style="color:var(--text2)">Despesas</span><span style="color:var(--red);font-weight:600">'+fmt(d)+'</span></div><div class="sr"><span style="color:var(--text2)">Saldo</span><span style="color:'+(r-d>=0?'var(--green)':'var(--red)')+';font-weight:700">'+fmt(r-d)+'</span></div>';}
function addLanc(){var desc=document.getElementById('l-desc').value.trim(),val=parseFloat(document.getElementById('l-val').value),vc=document.getElementById('l-venc').value;if(!desc||isNaN(val)||val<=0||!vc){alert('Preencha descri\xE7\xE3o, valor e vencimento.');return;}var rec=document.getElementById('l-rec').checked,freq=gv('l-freq'),df=gv('l-dfim');if(rec&&!df){alert('Informe a data final.');return;}var tp=rec?totP(vc,df,freq):null;var obj={desc:desc,tipo:document.getElementById('l-tipo').value,valor:val,vencimento:vc,nota:document.getElementById('l-nota').value.trim(),quitado:false,recorrente:rec,freq:rec?freq:null,dataFinal:rec?df:null,totalParcelas:tp,parcelaAtual:rec?1:null,criadoEm:Date.now()};db.collection('lancamentos').add(obj).then(function(r){D.la.unshift(Object.assign({id:r.id},obj));['l-desc','l-val','l-venc','l-nota','l-dfim'].forEach(function(i){document.getElementById(i).value='';});document.getElementById('l-rec').checked=false;document.getElementById('l-tp').value='';document.getElementById('rec-box').classList.remove('on');toast(rec?'✅ Recorrente! '+tp+' parcelas.':'✅ Lan\xE7amento salvo!');renderLancamentos();});}
function editarLanc(id){var l=D.la.find(function(x){return x.id===id;});if(!l)return;document.getElementById('el-id').value=id;document.getElementById('el-tipo').value=l.tipo;document.getElementById('el-desc').value=l.desc;document.getElementById('el-val').value=l.valor;document.getElementById('el-venc').value=l.vencimento||'';document.getElementById('el-nota').value=l.nota||'';var isRec=l.recorrente||false;document.getElementById('el-rec').checked=isRec;document.getElementById('el-rec-box').classList.toggle('on',isRec);document.getElementById('el-freq').value=l.freq||'mensal';document.getElementById('el-dfim').value=l.dataFinal||'';document.getElementById('el-tp').value=l.totalParcelas?l.totalParcelas+' parcelas':'';document.getElementById('modal-lanc').classList.add('on');}
function salvarLanc(){var id=document.getElementById('el-id').value,isRec=document.getElementById('el-rec').checked,df=gv('el-dfim'),freq=gv('el-freq'),vc=document.getElementById('el-venc').value;if(isRec&&!df){alert('Informe a data final.');return;}var tp=isRec?totP(vc,df,freq):null;var upd={tipo:document.getElementById('el-tipo').value,desc:document.getElementById('el-desc').value.trim(),valor:parseFloat(document.getElementById('el-val').value),vencimento:vc,nota:document.getElementById('el-nota').value.trim(),recorrente:isRec,freq:isRec?freq:null,dataFinal:isRec?df:null,totalParcelas:tp};if(!upd.desc||isNaN(upd.valor)){alert('Preencha todos os campos.');return;}db.collection('lancamentos').doc(id).update(upd).then(function(){var l=D.la.find(function(x){return x.id===id;});if(l)Object.assign(l,upd);fecharModal('modal-lanc');toast('✅ Atualizado!');renderLancamentos();});}
function delLanc(id){if(!confirm('Excluir?'))return;db.collection('lancamentos').doc(id).delete().then(function(){D.la=D.la.filter(function(l){return l.id!==id;});toast('Removido');renderLancamentos();});}
function quitLanc(id){var l=D.la.find(function(x){return x.id===id;});if(!l)return;db.collection('lancamentos').doc(id).update({quitado:true}).then(function(){l.quitado=true;var pi=l.recorrente&&l.parcelaAtual&&l.totalParcelas?' (parcela '+l.parcelaAtual+'/'+l.totalParcelas+')':'';var tr={tipo:l.tipo==='a-receber'?'receita':'despesa',desc:l.desc+pi,valor:l.valor,categoria:l.nota||'',data:new Date().toISOString().split('T')[0],criadoEm:Date.now()};db.collection('transacoes').add(tr).then(function(r){D.tr.unshift(Object.assign({id:r.id},tr));});if(l.recorrente&&l.freq&&l.dataFinal){var pv=proxV(l.vencimento,l.freq);if(pv<=l.dataFinal){var pp=(l.parcelaAtual||1)+1;var nl={desc:l.desc,tipo:l.tipo,valor:l.valor,vencimento:pv,nota:l.nota||'',quitado:false,recorrente:true,freq:l.freq,dataFinal:l.dataFinal,totalParcelas:l.totalParcelas,parcelaAtual:pp,criadoEm:Date.now()};db.collection('lancamentos').add(nl).then(function(r){D.la.unshift(Object.assign({id:r.id},nl));});toast('✅ Quitado! Parcela '+pp+'/'+l.totalParcelas+' gerada para '+fd(pv)+'.',4000);}else{toast('✅ Quitado! Ciclo encerrado \u{1F389}',4000);}}else{toast('✅ Quitado e lan\xE7ado no Financeiro!');}renderLancamentos();renderFin();});}
function renderLancamentos(){var ft=gv('lf-tipo'),fs=gv('lf-st'),ord=gv('lf-ord')||'asc';var list=D.la.filter(function(l){if(ft!==''&&l.tipo!==ft)return false;var st=stL(l);if(fs==='quitado'&&st!=='pago'&&st!=='recebido')return false;if(fs==='pendente'&&st!=='pendente')return false;if(fs==='vencido'&&st!=='vencido')return false;return true;});list.sort(function(a,b){return ord==='asc'?(a.vencimento||'').localeCompare(b.vencimento||''):(b.vencimento||'').localeCompare(a.vencimento||'');});if(!list.length){document.getElementById('lanc-body').innerHTML='<div class="empty">Nenhum lan\xE7amento.</div>';}else{document.getElementById('lanc-body').innerHTML='<table><tr><th>Vencimento</th><th>Descri\xE7\xE3o</th><th>Tipo</th><th style="text-align:right">Valor</th><th>Status</th><th></th></tr>'+list.map(function(l){var st=stL(l),d=dv(l.vencimento),al=(!l.quitado&&d>=0&&d<=3)?'<span style="font-size:10px;color:var(--amber);font-weight:600"> ⚠'+d+'d</span>':'',va=(!l.quitado&&d<0)?'<span style="font-size:10px;color:var(--red);font-weight:600"> ●'+Math.abs(d)+'d</span>':'',pb=l.recorrente&&l.parcelaAtual?'<span class="pb" style="margin-left:4px">'+l.parcelaAtual+'/'+(l.totalParcelas||'?')+'</span>':'';return '<tr><td style="font-size:12px;color:var(--text2)">'+fd(l.vencimento)+al+va+'</td><td style="font-weight:500">'+l.desc+pb+(l.nota?'<br><span style="font-size:11px;color:var(--text3)">'+l.nota+'</span>':'')+'</td><td><span class="bx '+l.tipo+'">'+(l.tipo==='a-pagar'?'A Pagar':'A Receber')+'</span></td><td style="text-align:right;font-weight:700;color:'+(l.tipo==='a-receber'?'var(--green)':'var(--red)')+'">'+fmt(l.valor)+'</td><td><span class="bx '+st+'">'+st+'</span></td><td style="white-space:nowrap">'+(!l.quitado?'<button class="btn sm" onclick="quitLanc(\''+l.id+'\')" style="color:var(--green);border-color:var(--green);margin-right:2px">✓</button>':'')+'<button class="eb" onclick="editarLanc(\''+l.id+'\')">&#x270F;&#xFE0F;</button><button class="ib" onclick="delLanc(\''+l.id+'\')">✕</button></td></tr>';}).join('')+'</table>';}var aR=D.la.filter(function(l){return l.tipo==='a-receber'&&!l.quitado;}).reduce(function(a,l){return a+l.valor;},0);var aP=D.la.filter(function(l){return l.tipo==='a-pagar'&&!l.quitado;}).reduce(function(a,l){return a+l.valor;},0);var vn=D.la.filter(function(l){return !l.quitado&&dv(l.vencimento)<0;}).length;document.getElementById('lanc-res').innerHTML='<div class="sr"><span style="color:var(--text2)">Total A Receber</span><span style="color:var(--green);font-weight:700">'+fmt(aR)+'</span></div><div class="sr"><span style="color:var(--text2)">Total A Pagar</span><span style="color:var(--red);font-weight:700">'+fmt(aP)+'</span></div><div class="sr"><span style="color:var(--text2)">Saldo futuro</span><span style="color:'+(aR-aP>=0?'var(--green)':'var(--red)')+';font-weight:700">'+fmt(aR-aP)+'</span></div><div class="sr"><span style="color:var(--text2)">Vencidos n\xE3o quitados</span><span style="color:'+(vn>0?'var(--red)':'var(--text3)')+';font-weight:700">'+vn+'</span></div>';}
function setPer(p){RP=p;['sem','men','per'].forEach(function(x){document.getElementById('rb-'+x).classList.toggle('on',x===p);});document.getElementById('rel-dd').classList.toggle('on',p==='per');}
function calcPer(){var h=new Date();h.setHours(0,0,0,0);var i,f,pi,pf;if(RP==='sem'){i=new Date(h);i.setDate(h.getDate()-h.getDay());f=new Date(i);f.setDate(i.getDate()+6);pi=new Date(f);pi.setDate(f.getDate()+1);pf=new Date(pi);pf.setDate(pi.getDate()+6);}else if(RP==='men'){i=new Date(h.getFullYear(),h.getMonth(),1);f=new Date(h.getFullYear(),h.getMonth()+1,0);pi=new Date(h.getFullYear(),h.getMonth()+1,1);pf=new Date(h.getFullYear(),h.getMonth()+2,0);}else{i=new Date(gv('r-ini')+'T12:00');f=new Date(gv('r-fim')+'T12:00');var df=f-i;pi=new Date(f);pi.setDate(pi.getDate()+1);pf=new Date(pi.getTime()+df);}function s(d){return d.toISOString().split('T')[0];}return{i:s(i),f:s(f),pi:s(pi),pf:s(pf)};}
function geraRel(){
  var per=calcPer(),i=per.i,f=per.f;
  var hj0=new Date();hj0.setHours(0,0,0,0);
  var diasPrev=parseInt(gv('rel-prev-dias'))||7;
  var ps_fim=new Date(hj0);ps_fim.setDate(hj0.getDate()+diasPrev);
  var ps_f=ps_fim.toISOString().split('T')[0];
  var tr=D.tr.filter(function(t){return t.data>=i&&t.data<=f;});
  var rec=tr.filter(function(t){return t.tipo==='receita';}).reduce(function(a,t){return a+t.valor;},0);
  var des=tr.filter(function(t){return t.tipo==='despesa';}).reduce(function(a,t){return a+t.valor;},0);
  var sld=rec-des;
  var sT=D.tr.filter(function(t){return t.tipo==='receita';}).reduce(function(a,t){return a+t.valor;},0)-D.tr.filter(function(t){return t.tipo==='despesa';}).reduce(function(a,t){return a+t.valor;},0);
  var aR=D.la.filter(function(l){return l.tipo==='a-receber'&&!l.quitado;}).reduce(function(a,l){return a+l.valor;},0);
  var aP=D.la.filter(function(l){return l.tipo==='a-pagar'&&!l.quitado;}).reduce(function(a,l){return a+l.valor;},0);
  var pL=D.la.filter(function(l){return !l.quitado&&l.vencimento<=ps_f;});
  var pR=pL.filter(function(l){return l.tipo==='a-receber';}).reduce(function(a,l){return a+l.valor;},0);
  var pP=pL.filter(function(l){return l.tipo==='a-pagar';}).reduce(function(a,l){return a+l.valor;},0);
  var nA=(sT+pR-pP)<0,vA=Math.abs(sT+pR-pP);
  var lb={'sem':'Semanal','men':'Mensal','per':'Personalizado'}[RP];
  var hj=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('rel-out').innerHTML=
    '<div class="rh"><div class="rl">Mood Mentoria<span>Relat\xF3rio Financeiro — '+lb+'</span></div><div class="rm"><strong>'+fd(i)+' a '+fd(f)+'</strong>Gerado em '+hj+'<br>Confidencial</div></div>'+
    '<div class="rs"><div class="rst">Resumo Executivo</div><div class="rk">'+
    '<div class="rkc"><div class="rkl">Saldo Acumulado</div><div class="rkv" style="color:'+(sT>=0?'var(--green)':'var(--red)')+'">'+fmt(sT)+'</div></div>'+
    '<div class="rkc"><div class="rkl">Receitas</div><div class="rkv" style="color:var(--green)">'+fmt(rec)+'</div></div>'+
    '<div class="rkc"><div class="rkl">Despesas</div><div class="rkv" style="color:var(--red)">'+fmt(des)+'</div></div>'+
    '<div class="rkc"><div class="rkl">Resultado</div><div class="rkv" style="color:'+(sld>=0?'var(--green)':'var(--red)')+'">'+fmt(sld)+'</div></div>'+
    '<div class="rkc"><div class="rkl">A Receber</div><div class="rkv" style="color:var(--blue)">'+fmt(aR)+'</div></div>'+
    '<div class="rkc"><div class="rkl">A Pagar</div><div class="rkv" style="color:var(--amber)">'+fmt(aP)+'</div></div>'+
    '</div><div class="rcw"><canvas id="rel-ch"></canvas></div></div>'+
    '<div class="rs"><div class="rst">\u{1F4C5} Previs\xE3o — Pendentes e pr\xF3ximos '+diasPrev+' dias (at\xE9 '+fd(ps_f)+')</div>'+
    (pL.length?pL.map(function(l){return '<div class="rpi"><div><div style="font-weight:600;font-size:13px">'+l.desc+'</div><div style="font-size:11px;color:var(--text3);margin-top:2px">Vencimento: '+fd(l.vencimento)+'&nbsp;&nbsp;<span class="bx '+(l.tipo==='a-receber'?'a-receber':'a-pagar')+'">'+(l.tipo==='a-receber'?'A Receber':'A Pagar')+'</span></div></div><div style="text-align:right"><div style="font-weight:700;color:'+(l.tipo==='a-receber'?'var(--green)':'var(--red)')+'">'+fmt(l.valor)+'</div></div></div>';}).join(''):'<div class="empty">Nenhum lan\xE7amento pendente ou a vencer no per\xEDodo selecionado</div>')+
    '<div style="margin-top:14px;padding:14px 16px;border-radius:var(--radius-sm);background:'+(nA?'var(--red-bg)':'var(--green-bg)')+';border:1px solid '+(nA?'rgba(240,98,146,.3)':'rgba(34,211,160,.3)')+'">'+
    '<div style="font-size:12px;font-weight:700;color:'+(nA?'var(--red)':'var(--green)')+';margin-bottom:4px">'+(nA?'⚠️ Necessidade de Aporte':'✅ Fluxo positivo previsto')+'</div>'+
    '<div style="font-size:13px;color:var(--text2)">'+(nA?'Necessidade de aporte de <strong style="color:var(--red)">'+fmt(vA)+'</strong> no per\xEDodo selecionado.':'Saldo projetado positivo de <strong style="color:var(--green)">'+fmt(sT+pR-pP)+'</strong>.')+'</div></div></div>'+
    '<div class="rs"><div class="rst">Movimenta\xE7\xF5es ('+tr.length+' registros)</div>'+
    '<table class="rt"><tr><th>Data</th><th>Descri\xE7\xE3o</th><th>Categoria</th><th style="text-align:center">Tipo</th><th style="text-align:right">Valor</th></tr>'+
    (tr.length?tr.map(function(t){return '<tr><td>'+fd(t.data)+'</td><td>'+t.desc+'</td><td style="color:var(--text3)">'+(t.categoria||'—')+'</td><td style="text-align:center"><span class="bx '+(t.tipo==='receita'?'receita':'despesa')+'">'+(t.tipo==='receita'?'Receita':'Despesa')+'</span></td><td style="text-align:right;font-weight:700;color:'+(t.tipo==='receita'?'var(--green)':'var(--red)')+'">'+fmt(t.valor)+'</td></tr>';}).join(''):'<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:20px">Nenhuma movimenta\xE7\xE3o</td></tr>')+
    '<tr><td colspan="3" style="font-weight:700;font-size:12px;background:var(--bg3)">Total</td><td style="background:var(--bg3)"></td><td style="text-align:right;font-weight:700;color:'+(sld>=0?'var(--green)':'var(--red)')+';background:var(--bg3)">'+fmt(sld)+'</td></tr></table></div>'+
    '<div class="rf">Mood Mentoria \xB7 '+hj+' \xB7 Confidencial</div>';
  document.getElementById('rel-wrap').style.display='block';
  setTimeout(function(){if(relCh)relCh.destroy();var c=cc();relCh=new Chart(document.getElementById('rel-ch').getContext('2d'),{type:'bar',data:{labels:['Receitas','Despesas'],datasets:[{data:[rec,des],backgroundColor:[c.greenBg,c.redBg],borderColor:[c.green,c.red],borderWidth:2,borderRadius:8,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:isDark()?'#1a1d27':'#fff',borderColor:isDark()?'#2e3248':'#e2e5f5',borderWidth:1,padding:10,callbacks:{label:function(x){return ' '+fmt(x.raw);}}}},scales:{y:{ticks:{callback:function(v){return 'R$'+v.toLocaleString('pt-BR');},font:{size:10},color:c.text},grid:{color:c.grid},border:{display:false}},x:{ticks:{font:{size:12},color:c.text},grid:{display:false},border:{display:false}}}}});},100);
}
function impRel(){if(document.getElementById('rel-wrap').style.display==='none'){alert('Gere o relat\xF3rio primeiro.');return;}window.print();}
function renderAll(){renderFin();renderLancamentos();renderDash();}
document.getElementById('f-data').value=new Date().toISOString().split('T')[0];
document.getElementById('l-venc').value=new Date().toISOString().split('T')[0];
</script>
</body>
